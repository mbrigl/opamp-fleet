# Minimal test Configuration for the "otelcol" supervisor example in config/client.toml — an
# otelcol-contrib WITH the opampextension reporting into the Supervisor Endpoint on port 4321.
# Distributed by scripts/seed_test_configs.sh as Configuration "otelcol-conf" (ADR-0012).

extensions:
  opamp:
    server:
      ws:
        endpoint: ws://127.0.0.1:4321/v1/opamp
        tls:
          insecure: true

receivers:
  otlp:
    protocols:
      http:
        endpoint: 127.0.0.1:4318

exporters:
  debug: {}

service:
  extensions: [opamp]
  telemetry:
    metrics:
      level: none # no internal-metrics listener — avoids the 8888 clash with otelcol-plain
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [debug]
