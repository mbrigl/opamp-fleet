# Minimal test Configuration for the "fluent-bit" supervisor example in config/client.toml — a
# dummy input echoed to stdout, so the process runs and produces visible output without touching
# the host. Distributed by scripts/seed_test_configs.sh as Configuration "fluent-bit-conf"
# (ADR-0012); the supervisor's -c argument points at the written entry file of that name.

[SERVICE]
    flush     1
    log_level info

[INPUT]
    name dummy
    tag  test

[OUTPUT]
    name  stdout
    match *
