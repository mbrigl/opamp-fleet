# OpAMP Fleet Client configuration (ADR-0008). Every setting is optional; the values shown are the
# defaults. Start with: cargo run -p client -- --config config/client.toml

# The Server's OpAMP endpoint. The URL scheme selects the transport (ADR-0007):
#   ws:// or wss://    → WebSocket (the default: Server pushes changes within seconds)
#   http:// or https:// → plain HTTP polling (see poll_interval_secs)
endpoint = "ws://127.0.0.1:4320/v1/opamp"

# The Agent's service.name — its human identity in the fleet UI and API.
name = "opamp-fleet-client"

# Poll interval of the plain-HTTP transport, in seconds (the protocol's default: 30).
poll_interval_secs = 30

# Heartbeat interval over the WebSocket transport, in seconds (the protocol's default: 30).
# 0 disables heartbeats; on plain HTTP every poll already is the periodic report.
heartbeat_interval_secs = 30

# Where the Client persists its instance_uid and the received remote configuration.
state_dir = "client-state"

# Operator-defined attributes (ADR-0012), reported by every Agent this Client presents so the
# Server's Selectors can target them. A [[supervisor]] block may add its own [supervisor.attributes]
# table, which overrides these per key.
# [attributes]
# env = "prod"

# Optional TLS trust override (ADR-0007) for wss:// / https:// against a private CA:
# [tls]
# ca_file = "ca.pem"

# Optional authentication toward the Server (ADR-0013): exactly one scheme — bearer_token, or
# username and password together. The Authorization header rides every plain-HTTP request and
# the WebSocket upgrade. Without TLS the credentials travel in cleartext; pair with wss:// or
# https:// beyond the loopback.
# [auth]
# bearer_token = "a-long-random-token"
# --- or ---
# username = "fleet"
# password = "a-strong-password"

# ── Supervisor Mode (ADR-0003, ADR-0011) ────────────────────────────────────────
# Each [[supervisor]] block runs one Supervisor managing one local process; each appears to the
# Server as its own Agent, all sharing this Client's one connection. Without any block, the
# Client presents itself as a single Agent, as above. The three blocks below show the three
# ways a Managed Process is brought into the fleet.

# 1. A Collector WITH the opampextension — it reports its own description, health, and
# effective configuration to the Supervisor Endpoint. The extension ships only in the Contrib
# distribution, hence otelcol-contrib. Pin endpoint_port and make sure the configuration the
# Server distributes carries the extension pointing at it:
#
#   extensions:
#     opamp:
#       server:
#         ws:
#           endpoint: ws://127.0.0.1:4321/v1/opamp
#           tls:
#             insecure: true
#   service:
#     extensions: [opamp]
#
# [[supervisor]]
# type = "collector"
# name = "otelcol"
# binary = "/usr/local/bin/otelcol-contrib"
# args = []                # extra arguments, appended after the --config flags
# endpoint_port = 4321     # the Supervisor Endpoint on 127.0.0.1 the extension connects to
# stop_timeout_secs = 10   # graceful-stop budget before the process is killed
# apply_grace_secs = 3     # how long a restarted process must survive before a received
#                          # configuration is acknowledged APPLIED (0 = acknowledge on start)

# 2. A Collector WITHOUT the extension — the core distribution has no opampextension, so the
# Supervisor observes it from the outside (spawn, exit, restart). endpoint_port stays unset:
# the endpoint still comes up on an ephemeral port (it always does), nothing ever connects.
# Every received config-map entry is written to <state_dir>/supervisors/<name>/config/ under its
# Configuration's name (ADR-0012) and passed as its own --config; a change restarts the collector.
# [[supervisor]]
# type = "collector"
# name = "otelcol-plain"
# binary = "/usr/local/bin/otelcol"

# 3. Any other process — a Foreign Agent under the example "command" Custom Supervisor. Fluent
# Bit speaks no OpAMP and reads its configuration from a file: point -c at the written entry file
# (named after the Configuration on the Server, here "fluent-bit-conf") and the Supervisor
# restarts the process on a change so it re-reads it.
# [[supervisor]]
# type = "command"
# name = "fluent-bit"
# command = "/opt/fluent-bit/bin/fluent-bit"
# args = ["-c", "/var/lib/opamp-fleet/client/default/state/supervisors/fluent-bit/config/fluent-bit-conf"]
# working_dir = "/var/lib/fluent-bit"   # optional
# [supervisor.attributes]               # optional attributes for this Agent (ADR-0012)
# role = "edge"
# [supervisor.env]                      # optional environment for the process
# FLB_LOG_LEVEL = "info"
