# OpAMP Fleet Server configuration (ADR-0008). Every setting is optional; the values shown are the
# defaults. Start with: cargo run -p server -- --config config/server.toml

# The single listener (ADR-0005): OpAMP endpoint (/v1/opamp), REST API (/api/v1/*), and UI (/)
# share it. Port 4320 is the protocol's default.
listen = "0.0.0.0:4320"

# Where Configurations (ADR-0012) are persisted across Server restarts — one JSON file each.
config_dir = "fleet-configs"

# Optional TLS (ADR-0007): with a certificate and key the listener serves HTTPS/WSS instead.
# [tls]
# cert_file = "cert.pem"
# key_file = "key.pem"

# Optional authentication on the OpAMP endpoint (ADR-0013). When the section is present, every
# OpAMP request — plain-HTTP POST or WebSocket upgrade — needs an Authorization header matching
# any listed credential; anything else is answered 401. Both schemes may be configured at once;
# several valid credentials allow overlapping rotation. Without [auth] the endpoint stays open.
# REST API and UI are not guarded by this.
# [auth]
# bearer_tokens = ["a-long-random-token"]
# [auth.basic_users]
# fleet = "a-strong-password"
