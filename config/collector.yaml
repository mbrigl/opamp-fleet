# The OpenTelemetry Collector configuration this server distributes to the fleet.
#
# This file IS the control loop: change it, and the running server pushes it to every connected
# supervisor, which writes it out and restarts its collector. Watch the server's log to see the agent
# report the new configuration back as applied.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Prints received telemetry to the collector's log. Change `verbosity` to `detailed` and watch the
  # sidecar restart with the new setting — the simplest way to see a config update take effect.
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
  telemetry:
    logs:
      level: info
