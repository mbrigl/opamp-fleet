# Cargo workspace (ADR-0005): the OpAMP Fleet Server and the Supervisor Host are two binaries that
# share one protocol layer (`opamp-proto`). One workspace, one Cargo.lock, one pinned toolchain
# (`rust-toolchain.toml`, ADR-0004), so every crate resolves the same compiler and dependency versions.
[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.97"
license = "Apache-2.0"
publish = false

# Versions are pinned once here and referenced from each crate with `<dep>.workspace = true`, so the
# Server and the Supervisor Host never diverge on tokio, prost, or the OpAMP wire crate.
[workspace.dependencies]
opamp-proto = { path = "crates/opamp-proto" }
tokio = { version = "1.52", features = ["rt-multi-thread", "macros", "net", "signal", "sync", "time", "fs", "io-util", "process"] }
axum = { version = "0.8", features = ["ws"] }
prost = "0.14"
prost-build = "0.14"
askama = "0.16"
serde = { version = "1", features = ["derive"] }
futures-util = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
sha2 = "0.10"
hex = "0.4"
# Sending SIGTERM to a supervised child for graceful shutdown (tokio's Child only exposes SIGKILL).
libc = "0.2"
# The OpAMP WebSocket client (supervisor -> server) and the supervisor's local server for the
# collector's opamp extension (ADR-0008). The rustls feature enables `wss://` for the client (ADR-0012).
tokio-tungstenite = { version = "0.30", features = ["rustls-tls-webpki-roots"] }
# Merging the opamp/health_check extensions into the collector config (ADR-0008).
serde_yaml = "0.9"
# TLS (rustls) and shared-token auth (ADR-0012). rustls uses the *ring* provider — no system OpenSSL and
# no cmake/aws-lc build (the Dev Container has cc + perl but not cmake). The provider is installed once at
# each binary's startup.
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
rustls-pemfile = "2"
# Server-side TLS listener; `-no-provider` so it uses the ring provider we install, not aws-lc-rs.
axum-server = { version = "0.7", default-features = false, features = ["tls-rustls-no-provider"] }
