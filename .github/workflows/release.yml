name: Release

# Release pipeline (ADR-0008, extended by ADR-0009). Manually triggered; the version is derived from the most recent
# `version/*` tag reachable from the ref this workflow runs on, parsed under strict SemVer and
# normalised to a dot-separated MAJOR.MINOR.PATCH used everywhere (env var, artifact names, release
# tag). Dry run by default: without `publish` the archives are uploaded as workflow-run artifacts
# only; with it they are attached to a GitHub Release under a normalised `v<version>` tag.
#
# The Supervisor Host ships for Linux, macOS (x86_64 + arm64), and Windows; the Server for Linux
# only (specification). Each archive gets a .sha256 — the digest ADR-0007's self-update
# (`update --hash`) and future OpAMP package delivery verify against.
#
# The Supervisor Host additionally ships as native installer packages (ADR-0009): .deb and .rpm
# (Linux), .msi (Windows), and .pkg (macOS, per architecture), each with its own .sha256. They are
# payload-only — they install the binary and never register an OS service — so `service install`
# (ADR-0006) and the versioned install root it lays out (ADR-0007) keep sole ownership of the
# service, and self-update works the same whether the binary came from a package or an archive.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a GitHub Release (off = build and upload run artifacts only)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # tags and history are needed to resolve the nearest version/* tag
      - name: Resolve and normalise the version from the nearest version/* tag
        id: resolve
        run: |
          set -euo pipefail
          # Match every accepted tag spelling: version/1.2.3, version/1.2/3, version/1/2/3.
          if ! tag="$(git describe --tags --abbrev=0 \
                --match 'version/*' --match 'version/*/*' --match 'version/*/*/*' 2>/dev/null)"; then
            echo "::error::No version/* tag is reachable from this ref. Create one first, e.g. 'version/1.0.0'."
            exit 1
          fi
          echo "Resolved tag: $tag"
          # Strict SemVer: exactly three non-negative integers, no leading zeros, no pre-release or
          # build metadata. The separator may be '.' or '/' (mixed permitted).
          pattern='^version/(0|[1-9][0-9]*)[./](0|[1-9][0-9]*)[./](0|[1-9][0-9]*)$'
          if [[ ! "$tag" =~ $pattern ]]; then
            echo "::error::Tag '$tag' is not a strict SemVer version/MAJOR.MINOR.PATCH tag (separator '.' or '/', no leading zeros, no pre-release or build metadata)."
            exit 1
          fi
          # Normalise: whatever separator the tag used, the version is always dot-separated.
          version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Normalised version: $version"

  build:
    name: ${{ matrix.bin }} (${{ matrix.target }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Supervisor Host — every supported platform (ADR-0006). `installer` selects the native
          # package format built alongside the archive (ADR-0009); the Server is not packaged.
          - { package: supervisor, bin: supervisor-host, os: ubuntu-latest, target: x86_64-unknown-linux-gnu, archive: tar.gz, installer: linux }
          - { package: supervisor, bin: supervisor-host, os: macos-latest, target: x86_64-apple-darwin, archive: tar.gz, installer: macos, pkgarch: x86_64 }
          - { package: supervisor, bin: supervisor-host, os: macos-latest, target: aarch64-apple-darwin, archive: tar.gz, installer: macos, pkgarch: arm64 }
          - { package: supervisor, bin: supervisor-host, os: windows-latest, target: x86_64-pc-windows-msvc, archive: zip, installer: windows }
          # Server — Linux only (specification), archive only (ADR-0009).
          - { package: server, bin: server, os: ubuntu-latest, target: x86_64-unknown-linux-gnu, archive: tar.gz, installer: none }
    steps:
      - uses: actions/checkout@v7
      - name: Set up Rust (stable + target)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Build
        env:
          # The tag-derived version, compiled into the binary via option_env! (ADR-0008).
          OPAMP_FLEET_VERSION: ${{ needs.version.outputs.version }}
        run: >
          cargo build --release --locked
          -p ${{ matrix.package }} --bin ${{ matrix.bin }} --target ${{ matrix.target }}
      - name: Package archive and checksum
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          name="opamp-fleet-${{ matrix.bin }}-${version}-${{ matrix.target }}"
          binary="${{ matrix.bin }}"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            binary="${binary}.exe"
          fi

          mkdir -p "dist/$name" artifacts
          cp "target/${{ matrix.target }}/release/$binary" "dist/$name/"
          cp README.md LICENSE "dist/$name/"

          asset="$name.${{ matrix.archive }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && 7z a -tzip "../artifacts/$asset" "$name" > /dev/null)
          else
            tar -czf "artifacts/$asset" -C dist "$name"
          fi

          # The digest ADR-0007's `update --hash` and future package delivery verify against.
          cd artifacts
          if command -v sha256sum > /dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
          cat "$asset.sha256"

      # ----------------------------------------------------------------------------------------
      # Native installer packages for the Supervisor Host (ADR-0009). Each is payload-only and
      # service-neutral: it installs the binary and its documentation and never registers an OS
      # service, so `service install` (ADR-0006) and the `current` pointer it lays out (ADR-0007)
      # stay the sole owners of what the service runs. All of them are built from the binary this
      # job already produced, and are checksummed exactly like the archives.
      # ----------------------------------------------------------------------------------------
      - name: Build .deb and .rpm
        if: ${{ matrix.installer == 'linux' }}
        env:
          NFPM_VERSION: "2.43.0"
          # nfpm expands this into the package metadata; the payload path is literal in the config.
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          base="opamp-fleet-${{ matrix.bin }}-${VERSION}-x86_64"
          nfpm pkg --config packaging/nfpm.yaml --packager deb --target "artifacts/${base}.deb"
          nfpm pkg --config packaging/nfpm.yaml --packager rpm --target "artifacts/${base}.rpm"

      - name: Build .msi
        if: ${{ matrix.installer == 'windows' }}
        shell: pwsh
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          # WiX v3 is preinstalled on windows-latest but is not on PATH; $env:WIX points at it.
          $candle = Join-Path $env:WIX 'bin\candle.exe'
          $light = Join-Path $env:WIX 'bin\light.exe'
          # Absolute paths, so the .wxs never depends on candle's working directory.
          $repoDir = $PWD.Path
          $binDir = Join-Path $repoDir 'target\${{ matrix.target }}\release'
          $asset = Join-Path $repoDir "artifacts\opamp-fleet-${{ matrix.bin }}-$env:VERSION-x86_64.msi"
          New-Item -ItemType Directory -Force -Path obj | Out-Null

          & $candle -nologo -arch x64 `
            "-dVersion=$env:VERSION" "-dBinDir=$binDir" "-dRepoDir=$repoDir" `
            -out obj\ packaging\wix\main.wxs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $light -nologo -out $asset obj\main.wixobj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build .pkg
        if: ${{ matrix.installer == 'macos' }}
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # Stage a filesystem root so --install-location / places each file at its final path.
          root="pkgroot"
          rm -rf "$root"
          mkdir -p "$root/usr/local/bin" "$root/usr/local/share/doc/opamp-fleet-supervisor-host"
          install -m 0755 "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$root/usr/local/bin/"
          install -m 0644 README.md LICENSE "$root/usr/local/share/doc/opamp-fleet-supervisor-host/"

          # No --scripts: the package carries no pre/postinstall script, so nothing can touch a
          # service. A component package is directly installable with `installer -pkg`, so
          # productbuild is not needed.
          pkgbuild \
            --root "$root" \
            --identifier io.github.mbrigl.opamp-fleet.supervisor-host \
            --version "$VERSION" \
            --install-location / \
            --ownership recommended \
            "artifacts/opamp-fleet-${{ matrix.bin }}-${VERSION}-${{ matrix.pkgarch }}.pkg"

      - name: Checksum installer packages
        if: ${{ matrix.installer != 'none' }}
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          shopt -s nullglob
          packages=(*.deb *.rpm *.msi *.pkg)
          if ((${#packages[@]} == 0)); then
            echo "::error::No installer package was produced for ${{ matrix.target }}."
            exit 1
          fi
          for asset in "${packages[@]}"; do
            if command -v sha256sum > /dev/null; then
              sha256sum "$asset" > "$asset.sha256"
            else
              shasum -a 256 "$asset" > "$asset.sha256"
            fi
            cat "$asset.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.bin }}-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: ${{ inputs.publish }}
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # creating the release tag and the release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create the normalised release tag
        run: |
          set -euo pipefail
          tag="v${{ needs.version.outputs.version }}"
          # Released versions are immutable: never re-tag an existing one.
          if git rev-parse -q --verify "refs/tags/$tag" > /dev/null; then
            echo "::error::Tag $tag already exists — version ${{ needs.version.outputs.version }} has been released. Bump the version/* tag."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
      - name: Publish the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: artifacts/*
          fail_on_unmatched_files: true
