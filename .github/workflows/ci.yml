name: CI

# Enforces the Definition of Done (AGENTS.md §5) on the stack decided in ADR-0005: build, test,
# lint, and format on Linux, plus release builds of the Client on every platform it ships on —
# Linux, Windows, and macOS — and of the Server on Linux only (docs/SPECIFICATION.md).
# The commands MUST match README.md → "Build, Test & Run", the single source of truth.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # rustup honours rust-toolchain.toml (stable + rustfmt + clippy) on first use.
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Lint & format check
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --locked -- -D warnings

  # ADR-0010: the client carries platform-specific service paths (the Windows SCM shim, launchd
  # semantics) that a Linux-only lint never compiles. Keep them honest: clippy and tests on the
  # real platforms. Actual service registration still needs the manual smoke checklist
  # (README.md → "Running as an OS service") — CI runners cannot exercise systemd/launchd/SCM.
  client-platform-check:
    name: client checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy -p client --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test -p client --locked

  # The Client ships on Linux, macOS, and Windows; the Server on Linux only.
  release-build:
    name: release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: client-linux, os: ubuntu-latest, package: client, binary: target/release/client }
          - { name: client-windows, os: windows-latest, package: client, binary: target/release/client.exe }
          - { name: client-macos, os: macos-latest, package: client, binary: target/release/client }
          - { name: server-linux, os: ubuntu-latest, package: server, binary: target/release/server }
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build -p ${{ matrix.package }} --release --locked
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
