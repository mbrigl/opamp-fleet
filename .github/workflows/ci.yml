name: CI

# Rust build/test/lint for the Cargo workspace (ADR-0003). The commands mirror README.md →
# "Build, Test & Run", the single source of truth (AGENTS.md §6), and enforce the Definition of
# Done (AGENTS.md §5). The Rust toolchain choice itself is recorded in ADR-0003.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Rust (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Format check
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
